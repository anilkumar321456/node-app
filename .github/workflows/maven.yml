
name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml

    # ✅ Rename BEFORE upload
    - name: Prepare WAR
      run: cp target/*.war target/vprofile-v1.war

    # ✅ Upload only WAR (not full target folder)
    - name: Upload WAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vprofile-war
        path: target/vprofile-v1.war

  docker:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    # ✅ Download WAR
    - name: Download WAR Artifact
      uses: actions/download-artifact@v4
      with:
        name: vprofile-war
        path: target

    - name: Check files
      run: ls -R
