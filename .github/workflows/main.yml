name: Build Push Deploy

on:
  push:
    branches:
      - master

jobs:

    build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml

    - name: Upload WAR Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vprofile-war
        path: target/vprofile-v1.war
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

    - name: Build Docker Image
      run: docker build -t my-app .

    - name: Tag Docker Image
      run: docker tag my-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push Docker Image to ECR
      run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Deploy Helm Chart on EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/node-app

          echo "Updating repository..."
          git pull origin master

          echo "Helm directory:"
          ls helm/node-app

          cd helm/node-app

          echo "Deploying with Helm..."
          helm upgrade --install node-app . \
            --set image.repository=${{ secrets.ECR_REPOSITORY }} \
            --set image.tag=latest
