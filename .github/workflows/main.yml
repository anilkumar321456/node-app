name: Build Push Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

    - name: Build Docker Image
      run: docker build -t my-app .

    - name: Tag Docker Image
      run: docker tag my-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    - name: Push Docker Image to ECR
      run: docker push ${{ secrets.ECR_REPOSITORY }}:latest
      
    - name: Copy helm chart to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "helm/node-app/*"
          target: "/home/ubuntu/node-app"

    - name: Deploy Helm Chart
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu/node-app

          echo "Project files:"
          ls -l

          echo "Helm chart location:"
          ls helm/node-app

          helm upgrade --install node-app helm/node-app \
            --set image.repository=${{ secrets.ECR_REPOSITORY }} \
            --set image.tag=latest
